<script>
function hardReload(){
  try{if(window.caches&&caches.keys){caches.keys().then(function(ks){ks.forEach(function(k){caches.delete(k);});});}}catch(e){}
  location.replace(location.pathname+"?v="+Date.now());
}
(function(){
  var RUNNING="v1200";
  var last=0;
  function check(){
    var now=Date.now();
    if(now-last<180000)return;
    last=now;
    try{
      fetch(location.pathname+"?_="+now,{cache:"no-store"})
        .then(function(r){return r.text();})
        .then(function(t){
          var m=t.match(/verbadge">(v\d+)/);
          if(m&&m[1]&&m[1]!==RUNNING){document.getElementById("updbar").style.display="block";}
        }).catch(function(){});
    }catch(e){}
  }
  document.addEventListener("visibilitychange",function(){if(!document.hidden)check();});
  setTimeout(check,4000);
})();
</script>
